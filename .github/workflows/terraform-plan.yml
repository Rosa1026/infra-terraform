name: Terraform Plan

on:
  pull_request:
    branches:
      - main

jobs:
  plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color > plan.txt
        continue-on-error: true

      - name: Send Plan to Discord (Bot + Buttons)
        if: always()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          PLAN_FILE="plan.txt"

          # Plan 요약 추출
          SUMMARY=$(grep "Plan:" $PLAN_FILE)

          ADD=$(echo $SUMMARY | awk '{print $2}')
          CHANGE=$(echo $SUMMARY | awk '{print $5}')
          DESTROY=$(echo $SUMMARY | awk '{print $8}')

          # 색상 결정
          if [ "$DESTROY" != "0" ]; then
            COLOR=15158332
          elif [ "$CHANGE" != "0" ]; then
            COLOR=16776960
          elif [ "$ADD" != "0" ]; then
            COLOR=3066993
          else
            COLOR=9807270
          fi

          PLAN_OUTPUT=$(tail -n 80 $PLAN_FILE)

          # 버튼용 custom_id
          APPROVE_ID="approve_pr_${PR_NUMBER}"
          REJECT_ID="reject_pr_${PR_NUMBER}"

          jq -n \
            --arg summary "$SUMMARY" \
            --arg plan "$PLAN_OUTPUT" \
            --arg approve_id "$APPROVE_ID" \
            --arg reject_id "$REJECT_ID" \
            --argjson color $COLOR \
            '{
              embeds: [
                {
                  title: "📢 Terraform Plan Result",
                  description: ("**" + $summary + "**\n```hcl\n" + $plan + "\n```"),
                  color: $color
                }
              ],
              components: [
                {
                  type: 1,
                  components: [
                    {
                      type: 2,
                      label: "Approve",
                      style: 3,
                      custom_id: $approve_id
                    },
                    {
                      type: 2,
                      label: "Reject",
                      style: 4,
                      custom_id: $reject_id
                    }
                  ]
                }
              ]
            }' \
          | curl -X POST "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_ID/messages" \
              -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
              -H "Content-Type: application/json" \
              -d @-
