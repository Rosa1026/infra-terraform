name: Terraform Plan

on:
  pull_request:
    branches:
      - main

jobs:
  plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color > plan.txt
        continue-on-error: true

      - name: Send Plan to Discord
        if: always()
        run: |
          PLAN_FILE="plan.txt"

          # Plan 요약 추출
          SUMMARY=$(grep "Plan:" $PLAN_FILE)

          ADD=$(echo $SUMMARY | awk '{print $2}')
          CHANGE=$(echo $SUMMARY | awk '{print $5}')
          DESTROY=$(echo $SUMMARY | awk '{print $8}')

          # 색상 결정 (Decimal 값 사용)
          if [ "$DESTROY" != "0" ]; then
            COLOR=15158332   # 🔴 Red
          elif [ "$CHANGE" != "0" ]; then
            COLOR=16776960   # 🟡 Yellow
          elif [ "$ADD" != "0" ]; then
            COLOR=3066993    # 🟢 Green
          else
            COLOR=9807270    # ⚪ Grey
          fi

          # plan 출력 일부만 사용 (너무 길면 Discord 제한 걸림)
          PLAN_OUTPUT=$(tail -n 80 $PLAN_FILE)

          jq -n \
            --arg summary "$SUMMARY" \
            --arg plan "$PLAN_OUTPUT" \
            --argjson color $COLOR \
            '{
              embeds: [
                {
                  title: "📢 Terraform Plan Result",
                  description: ("**" + $summary + "**\n```hcl\n" + $plan + "\n```"),
                  color: $color
                }
              ]
            }' \
          | curl -H "Content-Type: application/json" \
            -X POST \
            -d @- \
            ${{ secrets.DISCORD_WEBHOOK }}
